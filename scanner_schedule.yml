name: Green Gregory OS — Opportunity Scanner

on:
  # ── Scheduled runs — uncomment when local tests pass and secrets are set ──
  # schedule:
  #   - cron: "0 6,18 * * *"  # 6 AM and 6 PM UTC (1 AM / 1 PM Central)

  # ── Manual trigger always available from GitHub Actions UI ──
  workflow_dispatch:
    inputs:
      source:
        description: "Scanner source"
        required: false
        default: "all"
        type: choice
        options: [all, govdeals, publicsurplus, craigslist]
      dry_run:
        description: "Dry run — parse/match but do not send email or write to Sheets"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      seed_test_data:
        description: "Insert seed test listings (for pipeline validation before live feeds work)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  scan-and-alert:
    name: Scan → Match → Alert → Sync
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 gspread google-auth lxml

      # ── 4. Restore DB cache ───────────────────────────────────────────────────
      - name: Restore opportunity_os.db from cache
        uses: actions/cache@v4
        with:
          path: opportunity_os.db
          key: opportunity-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            opportunity-db-${{ runner.os }}-

      # ── 5. Seed test data (optional) ──────────────────────────────────────────
      - name: Seed test data
        if: ${{ github.event.inputs.seed_test_data == 'true' }}
        run: python scanner.py --seed-test-data

      # ── 6. Run scanner (live feeds) ───────────────────────────────────────────
      - name: Run scanner
        if: ${{ github.event.inputs.seed_test_data != 'true' }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          DRY="${{ github.event.inputs.dry_run || 'true' }}"
          if [ "$DRY" = "true" ]; then
            python scanner.py --source "$SOURCE" --dry-run
          else
            python scanner.py --source "$SOURCE"
          fi

      # ── 7. Run matcher ────────────────────────────────────────────────────────
      - name: Run matcher
        run: |
          DRY="${{ github.event.inputs.dry_run || 'true' }}"
          if [ "$DRY" = "true" ]; then
            python matcher.py --dry-run
          else
            python matcher.py --min-score 40
          fi

      # ── 8. Send email alerts ──────────────────────────────────────────────────
      - name: Send hot deal alerts
        env:
          GGG_EMAIL_USER: ${{ secrets.GGG_EMAIL_USER }}
          GGG_EMAIL_PASS: ${{ secrets.GGG_EMAIL_PASS }}
          GGG_EMAIL_TO:   ${{ secrets.GGG_EMAIL_TO }}
        run: |
          DRY="${{ github.event.inputs.dry_run || 'true' }}"
          if [ "$DRY" = "true" ]; then
            python alert_emailer.py --dry-run
          else
            python alert_emailer.py --min-score 40
          fi

      # ── 9. Sync to Google Sheets ──────────────────────────────────────────────
      - name: Sync to Google Sheets
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GGG_SPREADSHEET_ID:      ${{ secrets.GGG_SPREADSHEET_ID }}
        run: |
          DRY="${{ github.event.inputs.dry_run || 'true' }}"
          if [ "$DRY" = "true" ]; then
            python sheets_sync.py --dry-run
          else
            python sheets_sync.py
          fi

      # ── 10. Upload DB artifact ────────────────────────────────────────────────
      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opportunity-db-${{ github.run_number }}
          path: opportunity_os.db
          retention-days: 30

      # ── 11. Commit DB back to repo (uncomment once stable) ───────────────────
      # - name: Commit updated DB
      #   run: |
      #     git config user.name "GGG OS Bot"
      #     git config user.email "bot@greengregory.local"
      #     git add opportunity_os.db
      #     git diff --cached --quiet || \
      #       git commit -m "chore: db update $(date -u +'%Y-%m-%d %H:%M UTC')"
      #     git push
